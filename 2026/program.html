<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Programação — WBots 2026</title>
  <meta content="Programação do WBots 2026" name="description">

  <link href="assets/img/icon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700;800&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/css/variables.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="assets/css/wbots-2026.css" rel="stylesheet">
</head>

<body>

  <script>
    (function() {
      if (location.protocol === 'file:') return;
      var x = new XMLHttpRequest();
      x.open('GET', 'partials/header.html', false);
      x.send(null);
      if (x.status === 200) document.write(x.responseText);
    })();
  </script>

  <section class="page-hero">
    <div class="container">
      <div class="section-tag" data-aos="fade-up">11/09/2026</div>
      <h1 data-aos="fade-up" data-aos-delay="50">Programação</h1>
      <p data-aos="fade-up" data-aos-delay="100">Grade completa do Workshop sobre Bots na Engenharia de Software 2026.</p>
    </div>
  </section>

  <main id="main">
    <section class="program-section">
      <div class="container">

        <div class="program-wrap" data-aos="fade-up">
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <td style="width:200px;">Horário</td>
                  <th scope="col" colspan="5">Sessão</th>
                </tr>
              </thead>
              <tbody id="program-body">
                <!-- preenchido via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <div id="program-fallback" class="coming-soon mt-4" style="display:none;">
          <div class="cs-icon"><i class="bi bi-calendar3"></i></div>
          <h2>Em breve</h2>
          <p>A programação completa será divulgada em breve.</p>
        </div>

      </div>
    </section>
  </main>

  <script>
    (function() {
      if (location.protocol === 'file:') return;
      var x = new XMLHttpRequest();
      x.open('GET', 'partials/footer.html', false);
      x.send(null);
      if (x.status === 200) document.write(x.responseText);
    })();
  </script>

  <a href="#" class="scroll-top d-flex align-items-center justify-content-center">
    <i class="bi bi-arrow-up-short"></i>
  </a>
  <div id="preloader"></div>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>

  <script>
    const program = [];

    function renderProgram(data) {
      const tbody = document.getElementById("program-body");
      const fallback = document.getElementById("program-fallback");
      tbody.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        fallback.style.display = "flex";
        return;
      }
      fallback.style.display = "none";

      data.forEach((item, idx) => {
        const tr = document.createElement("tr");
        const tdTime = document.createElement("td");
        tdTime.className = "time-cell";
        tdTime.innerHTML = `<i class="bi bi-clock me-2"></i>${item.time}`;

        const tdInfo = document.createElement("td");
        tdInfo.colSpan = 5;

        const type = (item.type || "").toLowerCase();
        const isBreak    = type.includes("coffee");
        const isOpening  = type.includes("opening");
        const isClosing  = type.includes("closing");
        const isPanelish = type.includes("panel") || type.includes("challenges");
        const hasAuthors = Array.isArray(item.authors) && item.authors.length > 0;

        let titleHTML = item.title || "";
        if (isBreak)    titleHTML = `<i class="bi bi-cup-hot me-2"></i>Coffee break`;
        else if (isOpening) titleHTML = `<i class="bi bi-megaphone me-2"></i>${item.title}`;
        else if (isClosing) titleHTML = `<i class="bi bi-flag me-2"></i>${item.title}`;
        else if (isPanelish) titleHTML = `<i class="bi bi-people me-2"></i>${item.title}`;

        if (isBreak || isOpening || isClosing) {
          tr.style.background = "rgba(14,162,189,.06)";
          tdInfo.style.color = "var(--w-light)";
          tdInfo.style.fontWeight = "600";
          tdInfo.innerHTML = titleHTML;
        } else if (hasAuthors) {
          const cid = `det-${idx}`;
          tdInfo.innerHTML = `
            <button class="btn btn-link p-0 text-start" data-bs-toggle="collapse" data-bs-target="#${cid}"
                    style="color:var(--w-text);text-decoration:none;font-size:.9rem;">
              <i class="bi bi-chevron-right me-1" style="color:var(--w-primary);font-size:.75rem;"></i>${titleHTML}
            </button>
            <div id="${cid}" class="collapse mt-2">
              <small style="color:var(--w-muted);"><strong style="color:var(--w-primary);">Autores:</strong> ${item.authors.join(", ")}</small>
            </div>`;
        } else {
          tdInfo.innerHTML = titleHTML;
        }

        tr.appendChild(tdTime);
        tr.appendChild(tdInfo);
        tbody.appendChild(tr);
      });
    }

    document.addEventListener("DOMContentLoaded", () => renderProgram(program));
  </script>

  <script src="assets/js/main.js"></script>
</body>
</html>
