<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WBOTS — Workshop sobre Bots na Engenharia de Software</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --w-bg:      #050c1a;
      --w-bg2:     #080f1e;
      --w-card:    #0c1a2e;
      --w-card2:   #0f1e35;
      --w-border:  rgba(14,162,189,.16);
      --w-glow:    rgba(14,162,189,.30);
      --w-primary: #0ea2bd;
      --w-light:   #1ec3e0;
      --w-accent:  #00d4ff;
      --w-text:    #dde6f0;
      --w-muted:   #6e82a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--w-bg);
      color: var(--w-text);
      font-family: 'Open Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,162,189,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,162,189,.04) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 20%, rgba(14,162,189,.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(0,212,255,.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HERO VISUAL ── */
    .hero-visual {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 44px;
      z-index: 1;
    }

    .hero-visual img {
      width: 120px;
      filter: drop-shadow(0 0 40px rgba(14,162,189,.35));
      animation: float 7s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(14,162,189,.12);
    }
    .ring-1 { width: 180px; height: 180px; animation: spin 24s linear infinite; }
    .ring-2 { width: 240px; height: 240px; animation: spin 38s linear infinite reverse; border-color: rgba(14,162,189,.07); }
    .ring-3 { width: 300px; height: 300px; animation: spin 52s linear infinite; border-color: rgba(14,162,189,.04); }

    .ring-1::before, .ring-2::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 7px; height: 7px;
      background: var(--w-light);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--w-primary);
      transform: translateX(-50%);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── EYEBROW ── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,162,189,.10);
      border: 1px solid rgba(14,162,189,.28);
      color: var(--w-light);
      padding: 5px 16px;
      border-radius: 100px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--w-light);
      border-radius: 50%;
      animation: blink 2s ease infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.65); }
    }

    /* ── TITLE ── */
    .main-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .main-title .grad {
      background: linear-gradient(130deg, var(--w-primary), var(--w-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .main-subtitle {
      color: var(--w-muted);
      font-size: .97rem;
      text-align: center;
      max-width: 480px;
      line-height: 1.75;
      margin-bottom: 52px;
      position: relative;
      z-index: 1;
    }

    /* ── EDITION CARDS ── */
    .editions-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    .edition-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--w-card);
      border: 1px solid var(--w-border);
      border-radius: 14px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--w-text);
      transition: border-color .25s, box-shadow .25s, transform .25s, background .25s;
      position: relative;
      overflow: hidden;
    }

    .edition-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--w-primary), transparent);
      opacity: 0;
      transition: opacity .3s;
    }

    .edition-card:hover {
      border-color: rgba(14,162,189,.38);
      box-shadow: 0 8px 32px rgba(14,162,189,.12);
      transform: translateY(-3px);
      background: var(--w-card2);
      color: var(--w-text);
      text-decoration: none;
    }

    .edition-card:hover::before { opacity: 1; }

    .edition-card.featured {
      border-color: rgba(14,162,189,.28);
      background: rgba(14,162,189,.05);
    }

    .card-icon {
      width: 46px; height: 46px;
      flex-shrink: 0;
      background: rgba(14,162,189,.11);
      border: 1px solid rgba(14,162,189,.20);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--w-primary);
    }

    .edition-card.featured .card-icon {
      background: rgba(14,162,189,.16);
      border-color: rgba(14,162,189,.32);
      color: var(--w-light);
    }

    .card-body { flex: 1; }

    .card-year {
      font-family: 'Poppins', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 3px;
    }

    .badge-new {
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .9px;
      background: rgba(14,162,189,.15);
      border: 1px solid rgba(14,162,189,.30);
      color: var(--w-light);
      padding: 2px 8px;
      border-radius: 100px;
    }

    .card-desc {
      font-size: .82rem;
      color: var(--w-muted);
      line-height: 1.4;
    }

    .card-arrow {
      color: var(--w-primary);
      font-size: 1.1rem;
      transition: transform .22s;
      flex-shrink: 0;
    }

    .edition-card:hover .card-arrow { transform: translateX(4px); }

    /* ── FOOTER NOTE ── */
    .footer-note {
      margin-top: 52px;
      color: var(--w-muted);
      font-size: .75rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .footer-note a { color: var(--w-primary); text-decoration: none; }
    .footer-note a:hover { color: var(--w-light); }

    @media (max-width: 480px) {
      .ring-3 { display: none; }
    }
  </style>
</head>
<body>

  <div class="hero-visual">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <img src="2026/assets/img/logo4.png" alt="WBots" onerror="this.style.display='none'">
  </div>

  <div class="eyebrow">
    <span class="dot"></span>
    Workshop sobre Bots na Engenharia de Software
  </div>

  <h1 class="main-title">
    <span class="grad">WBots</span> Workshops
  </h1>

  <p class="main-subtitle">
    Selecione uma edição para acessar o site do evento.
  </p>

  <div class="editions-grid" id="editions-grid"></div>

  <p class="footer-note">
    Co-sediado com a <a href="https://cbsoft.sbc.org.br/" target="_blank">CBSoft</a> — Conferência Brasileira de Software
  </p>

  <script>
    const editions = [
      { year: 2026, desc: 'III Edição · CBSoft 2026 · USP, São Paulo, SP', featured: true },
      { year: 2025, desc: 'II Edição · CBSoft 2025',                  featured: false },
      { year: 2024, desc: 'I Edição · CBSoft 2024',                   featured: false },
    ];

    const grid = document.getElementById('editions-grid');

    editions.forEach(({ year, desc, featured }) => {
      const a = document.createElement('a');
      a.href = `${year}/`;
      a.className = 'edition-card' + (featured ? ' featured' : '');
      a.innerHTML = `
        <div class="card-icon"><i class="bi bi-calendar-event${featured ? '-fill' : ''}"></i></div>
        <div class="card-body">
          <div class="card-year">
            Edição ${year}
            ${featured ? '<span class="badge-new">Atual</span>' : ''}
          </div>
          <div class="card-desc">${desc}</div>
        </div>
        <i class="bi bi-arrow-right card-arrow"></i>
      `;
      grid.appendChild(a);
    });
  </script>

</body>
</html>
